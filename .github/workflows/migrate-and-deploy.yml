name: Migrate from source and Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  migrate:
    name: Clone source repo and push all files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Clone source repo (1980549/guardiao-sobrio-digital)
        run: |
          git clone --depth=1 https://github.com/1980549/guardiao-sobrio-digital.git /tmp/source

      - name: Copy all source files (excluding .git, .lovable and .github)
        run: |
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            -exec rm -rf {} +
          rsync -av \
            --exclude='.git' \
            --exclude='.lovable' \
            --exclude='.github' \
            /tmp/source/ .

      - name: Configure git
        run: |
          git config user.name "vanzer80"
          git config user.email "actions@github.com"

      - name: Commit all migrated files
        run: |
          git add -A
          git status
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "chore: migrate full codebase from 1980549/guardiao-sobrio-digital"

      - name: Push to main
        run: git push origin main

  deploy:
    name: Build and Deploy to GitHub Pages
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
