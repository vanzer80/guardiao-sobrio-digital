name: Import code from guardiao-sobrio-digital

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v4
        with:
          path: dest
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone source repo
        run: |
          git clone --depth=1 https://github.com/1980549/guardiao-sobrio-digital.git source

      - name: Copy source files to destination (exclude .git .lovable .github)
        run: |
          rsync -av \
            --exclude='.git' \
            --exclude='.lovable' \
            --exclude='.github' \
            source/ dest/

      - name: Commit and push
        run: |
          cd dest
          git config user.name "vanzer80"
          git config user.email "vanzer80@users.noreply.github.com"
          git add -A
          git status
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "chore: migrate full codebase from 1980549/guardiao-sobrio-digital"
          git push origin main
